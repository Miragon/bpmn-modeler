defaultSemverRangePrefix: ""

approvedGitRepositories:
  - "**"

# Save dependencies pinned to the exact published version. Mirrors the
# `save-exact=true` in .npmrc and the `pin-npm-dependencies` CI check;
# any future `yarn add <pkg>` lands in package.json without ^ or ~.
defaultSemverRangePrefix: ""

enableScripts: true

nodeLinker: node-modules

npmScopes:
  miragon:
    npmRegistryServer: "https://npm.pkg.github.com"
    npmAlwaysAuth: true
    npmAuthToken: "${GITHUB_TOKEN}"
