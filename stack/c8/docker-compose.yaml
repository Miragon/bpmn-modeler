services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "18080:8080"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/keycloak-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  elasticsearch:
    image: elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  zeebe:
    image: camunda/zeebe:8.6.0
    environment:
      ZEEBE_HOST: 0.0.0.0
      ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME: io.camunda.zeebe.exporter.ElasticsearchExporter
      ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL: http://elasticsearch:9200
      ZEEBE_BROKER_GATEWAY_SECURITY_AUTHENTICATION_MODE: identity
      ZEEBE_BROKER_GATEWAY_SECURITY_AUTHENTICATION_IDENTITY_ISSUERBACKENDURL: http://keycloak:8080/realms/camunda-platform
      ZEEBE_BROKER_GATEWAY_SECURITY_AUTHENTICATION_IDENTITY_AUDIENCE: zeebe-api
      ZEEBE_BROKER_GATEWAY_SECURITY_AUTHENTICATION_IDENTITY_TYPE: keycloak
    ports:
      - "8080:8080"
      - "26500:26500"
    depends_on:
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    # Token endpoint: http://localhost:18080/realms/camunda-platform/protocol/openid-connect/token
    # Client ID: zeebe-client / Client Secret: test-secret

  operate:
    image: camunda/operate:8.6.0
    environment:
      CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS: zeebe:26500
      CAMUNDA_OPERATE_ELASTICSEARCH_URL: http://elasticsearch:9200
      CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_URL: http://elasticsearch:9200
      SPRING_PROFILES_ACTIVE: auth
      CAMUNDA_OPERATE_ZEEBE_SECURE: "false"
      ZEEBE_CLIENT_ID: zeebe-client
      ZEEBE_CLIENT_SECRET: test-secret
      ZEEBE_AUTHORIZATION_SERVER_URL: http://keycloak:8080/realms/camunda-platform/protocol/openid-connect/token
      ZEEBE_TOKEN_AUDIENCE: zeebe-api
      SERVER_SERVLET_CONTEXT_PATH: /
    ports:
      - "8081:8080"
    depends_on:
      elasticsearch:
        condition: service_healthy
      zeebe:
        condition: service_started
      keycloak:
        condition: service_healthy
