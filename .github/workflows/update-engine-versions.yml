name: Update Engine Versions

on:
  schedule:
    - cron: "0 6 * * 0"  # Every Sunday at 06:00 UTC
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup NodeJS 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Fetch latest Camunda versions and update registry
        id: update
        run: node .github/scripts/update-engine-versions.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pull request
        if: steps.update.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/update-engine-versions"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add apps/modeler-plugin/src/domain/engineVersions.ts
          git commit -m "$(cat <<'EOF'
          chore: update Camunda engine versions

          ${{ steps.update.outputs.summary }}
          EOF
          )"
          git push --force-with-lease origin "$BRANCH"

          # Only create a new PR if one does not already exist for this branch.
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "chore: update Camunda engine versions" \
              --body "$(cat <<'EOF'
          ## Summary
          - ${{ steps.update.outputs.summary }}
          - Auto-generated by the **Update Engine Versions** workflow

          ## Test plan
          - [ ] `corepack yarn build` passes
          - [ ] New version appears in the engine version quick pick
          EOF
          )"
          else
            echo "PR #$EXISTING already exists — updated branch via force-push."
          fi
