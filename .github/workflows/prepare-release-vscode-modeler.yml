name: Prepare Release VS Code Modeler

# Bumps the VS Code modeler version, runs lint+test+build as a sanity gate,
# commits and tags the bump, then creates a draft GitHub Release.
# Publishing is handled by publish-vscode-modeler.yml on release: published.

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Dry run (no commit, tag, or release)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: bpmn-modeler-prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PAT }}

      - name: Check pinned dependencies
        uses: Miragon/pin-npm-dependencies@v1

      - name: Corepack enable
        run: corepack enable

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies (focused)
        run: yarn workspaces focus bpmn-vscode-modeler vs-code-bpmn-modeler bpmn-webview dmn-webview deployment-webview @bpmn-modeler/shared @bpmn-modeler/append-menu @bpmn-modeler/bpmn-clipboard @bpmn-modeler/bpmn-i18n @bpmn-modeler/element-template-chooser @bpmn-modeler/create-append-c7-element-templates

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/${{ github.repository }}"

      - name: Bump version
        id: version
        run: |
          PKG_PATH="./apps/modeler-plugin/package.json"
          PKG_NAME=$(node -e "console.log(require('$PKG_PATH').name)")
          yarn workspace "$PKG_NAME" version "${{ inputs.release-type }}"
          yarn version apply --all
          NEW_VERSION=$(node -e "console.log(require('$PKG_PATH').version)")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not exist
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; aborting." && exit 1
          fi

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      - name: Commit and tag
        if: success() && inputs.dry-run == false && github.ref == 'refs/heads/main'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          git add apps/modeler-plugin/package.json
          git commit -m "chore(release): bump version to ${NEW_VERSION}"
          git push origin HEAD
          git tag -a "v${NEW_VERSION}" -m "release v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Create GitHub Release
        if: success() && inputs.dry-run == false && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
