name: Prepare Release VS Code Modeler

# Bumps the VS Code modeler version, runs lint+test+build as a sanity gate,
# commits and tags the bump, then creates a draft GitHub Release.
# Publishing is handled by publish-vscode-modeler.yml on release: published.

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Dry run (no commit, tag, or release)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: bpmn-modeler-prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PAT }}

      - name: Check pinned dependencies
        uses: Miragon/pin-npm-dependencies@v1

      - name: Corepack enable
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn

      - name: Install dependencies (focused)
        run: yarn workspaces focus bpmn-modeler vs-code-bpmn-modeler @miragon/bpmn-modeler-webview @miragon/dmn-modeler-webview @miragon/bpmn-modeler-deployment-webview @miragon/bpmn-modeler-shared @miragon/bpmn-modeler-append-menu @miragon/bpmn-modeler-clipboard @miragon/bpmn-modeler-i18n @miragon/bpmn-modeler-element-template-chooser @miragon/create-append-c7-element-templates

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/${{ github.repository }}"

      # Edit package.json in place rather than using `yarn workspace ... version`
      # + `yarn version apply --all`: yarn's version apply triggers a full
      # (non-focused) install, which builds native deps from the standalone
      # Theia workspace (native-keymap, electron, @theia/ffmpeg, ...) and
      # fails on the runner. The lockfile uses `workspace:` resolution for the
      # bumped package, so no lockfile sync is needed.
      - name: Bump version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release-type }}
        run: |
          PKG_PATH="./apps/modeler-plugin/package.json"
          NEW_VERSION=$(node -e "
            const fs = require('fs');
            const path = '$PKG_PATH';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            const [maj, min, pat] = pkg.version.split('.').map(Number);
            const type = process.env.RELEASE_TYPE;
            const next = type === 'major' ? \`\${maj + 1}.0.0\`
                       : type === 'minor' ? \`\${maj}.\${min + 1}.0\`
                       : \`\${maj}.\${min}.\${pat + 1}\`;
            pkg.version = next;
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            process.stdout.write(next);
          ")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not exist
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; aborting." && exit 1
          fi

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      - name: Commit and tag
        if: success() && inputs.dry-run == false && github.ref == 'refs/heads/main'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          git add apps/modeler-plugin/package.json
          git commit -m "chore(release): bump version to ${NEW_VERSION}"
          git push origin HEAD
          git tag -a "v${NEW_VERSION}" -m "release v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Create GitHub Release
        if: success() && inputs.dry-run == false && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
