name: Build

on:
  push:
  pull_request:
    types: [ opened, reopened, synchronize ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Check pinned dependencies
        uses: Miragon/pin-npm-dependencies@v1

      - name: Enable corepack
        run: corepack enable

      - name: Setup NodeJS 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Linux build deps for Theia native modules
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev

      - name: Install dependencies
        run: yarn install --immutable
        env:
          # @vscode/ripgrep postinstall hits the GitHub API; without a
          # token it gets rate-limited (403) on busy days.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit dependencies
        run: yarn npm audit --all --severity high

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: "./coverage"
          fail_ci_if_error: false
          flags: unittests
          name: bpmn-vscode-modeler
          verbose: true
