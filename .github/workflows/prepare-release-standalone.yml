name: Prepare Release Standalone

# Bumps the standalone app and standalone-extension versions in lockstep,
# commits and tags the bump, then creates a GitHub Release. Building,
# signing, notarizing and publishing the DMG is handled by
# publish-standalone.yml.
#
# Callable two ways:
#   - workflow_dispatch (manual single-step run)
#   - workflow_call (from release-standalone.yml orchestrator)

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Dry run (no commit, tag, or release)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      release-type:
        description: 'Release type (patch/minor/major)'
        required: true
        type: string
      dry-run:
        description: 'Dry run (no commit, tag, or release)'
        required: false
        type: boolean
        default: false
    outputs:
      version:
        description: 'The new version (e.g. 0.0.4). The release tag is always standalone-v${version}.'
        value: ${{ jobs.prepare.outputs.version }}
    secrets:
      RELEASE_PAT:
        description: 'PAT with repo scope, used to push commits/tags and create the release'
        required: true

permissions:
  contents: write

concurrency:
  group: standalone-prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/${{ github.repository }}"

      - name: Bump version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release-type }}
        run: |
          NEW_VERSION=$(node -e '
            const fs = require("fs");
            const t = process.env.RELEASE_TYPE;
            const p = "apps/standalone/package.json";
            const q = "libs/standalone-extension/package.json";
            const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
            const [maj, min, pat] = pkg.version.split(".").map(Number);
            const next = t === "major" ? `${maj + 1}.0.0`
                       : t === "minor" ? `${maj}.${min + 1}.0`
                                       : `${maj}.${min}.${pat + 1}`;
            pkg.version = next;
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            const ext = JSON.parse(fs.readFileSync(q, "utf8"));
            ext.version = next;
            fs.writeFileSync(q, JSON.stringify(ext, null, 2) + "\n");
            console.log(next);
          ')
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not exist
        run: |
          TAG="standalone-v${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; aborting." && exit 1
          fi

      - name: Commit and tag
        if: success() && inputs.dry-run == false && github.ref == 'refs/heads/main'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          TAG="standalone-v${NEW_VERSION}"
          git add apps/standalone/package.json libs/standalone-extension/package.json
          git commit -m "chore(release): standalone v${NEW_VERSION}"
          git push origin HEAD
          git tag -a "$TAG" -m "release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: success() && inputs.dry-run == false && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: standalone-v${{ steps.version.outputs.version }}
          name: 'Standalone v${{ steps.version.outputs.version }}'
          generate_release_notes: true
