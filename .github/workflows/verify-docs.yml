name: Verify Docs

# Runs the docs workspace's Vitest suite and a full VitePress build to catch
# Vue/markdown/config regressions before they reach the deploy pipeline.
# Triggered only when files under `docs/**` change so unrelated PRs aren't
# slowed down by an irrelevant CI step.

on:
  push:
    paths:
      - 'docs/**'
      - '.github/workflows/verify-docs.yml'
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'docs/**'
      - '.github/workflows/verify-docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Miragon/pin-npm-dependencies@v1
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn
      - run: corepack yarn workspaces focus docs
      - run: corepack yarn docs:test
      - run: corepack yarn docs:build
