name: Prepare Release create-append-c7-element-templates

# Bumps the @miragon/create-append-c7-element-templates version,
# builds it as a sanity gate, commits and tags the bump, then creates
# a GitHub Release. Publishing to npm is handled by
# publish-create-append-c7.yml on release: published.

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Dry run (no commit, tag, or release)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: create-append-c7-prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PAT }}

      - name: Check pinned dependencies
        uses: Miragon/pin-npm-dependencies@v1

      - name: Corepack enable
        run: corepack enable

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies (focused)
        run: yarn workspaces focus bpmn-modeler @miragon/create-append-c7-element-templates

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/${{ github.repository }}"

      - name: Bump version
        id: version
        run: |
          PKG_NAME="@miragon/create-append-c7-element-templates"
          yarn workspace "$PKG_NAME" version "${{ inputs.release-type }}"
          NEW_VERSION=$(node -e "console.log(require('./libs/create-append-c7-element-templates/package.json').version)")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not exist
        run: |
          TAG="create-append-c7-element-templates/v${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; aborting." && exit 1
          fi

      - name: Build library
        run: yarn workspace @miragon/create-append-c7-element-templates build

      - name: Commit and tag
        if: success() && inputs.dry-run == false && github.ref == 'refs/heads/main'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          TAG="create-append-c7-element-templates/v${NEW_VERSION}"
          git add libs/create-append-c7-element-templates/package.json
          git commit -m "chore(release): @miragon/create-append-c7-element-templates v${NEW_VERSION}"
          git push origin HEAD
          git tag -a "$TAG" -m "release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: success() && inputs.dry-run == false && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: create-append-c7-element-templates/v${{ steps.version.outputs.version }}
          name: '@miragon/create-append-c7-element-templates v${{ steps.version.outputs.version }}'
          generate_release_notes: true
