name: Publish VS Code Modeler

# Builds and publishes the VS Code extension. Manual workflow_dispatch only;
# dry-run uploads a vsix artifact, non-dry-run publishes to the VS Code
# Marketplace using the version in apps/modeler-plugin/package.json.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (build + package, do not publish)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: bpmn-modeler-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check pinned dependencies
        uses: Miragon/pin-npm-dependencies@v1

      - name: Corepack enable
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn

      - name: Install dependencies (focused)
        run: yarn workspaces focus bpmn-modeler vs-code-bpmn-modeler @miragon/bpmn-modeler-webview @miragon/dmn-modeler-webview @miragon/bpmn-modeler-deployment-webview @miragon/bpmn-modeler-shared @miragon/bpmn-modeler-append-menu @miragon/bpmn-modeler-clipboard @miragon/bpmn-modeler-i18n @miragon/bpmn-modeler-element-template-chooser @miragon/create-append-c7-element-templates

      - name: Resolve version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./apps/modeler-plugin/package.json').version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: yarn build

      - name: Install vsce
        run: npm install -g @vscode/vsce@3.2.2

      - name: Package vsix
        working-directory: dist/apps/modeler-plugin
        run: vsce package --out bpmn-modeler-plugin.vsix --yarn --no-dependencies

      - name: Upload vsix artifact (dry-run)
        if: inputs.dry-run == true
        uses: actions/upload-artifact@v7
        with:
          name: bpmn-modeler-plugin-v${{ steps.version.outputs.version }}
          path: dist/apps/modeler-plugin/bpmn-modeler-plugin.vsix
          retention-days: 7

      - name: Publish to VS Code Marketplace
        if: inputs.dry-run == false
        working-directory: dist/apps/modeler-plugin
        run: vsce publish --yarn --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PUBLISH }}
